<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Poker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="loading">Connecting to meeting...</div>

    <div id="main" hidden>

      <header class="panel-header">
        <span class="panel-title">🃏 Planning Poker</span>
        <span class="host-badge" id="host-badge" hidden>Facilitator</span>
      </header>

      <!-- Story title: editable for host, read-only for participants -->
      <div class="story-bar">
        <input
          type="text"
          id="story-input"
          class="story-input"
          placeholder="Story title (optional)…"
          maxlength="120"
          hidden
        >
        <p class="story-display" id="story-display" hidden></p>
        <button class="claim-btn" id="claim-btn" hidden>Claim Facilitator</button>
      </div>

      <!-- View 1: pick a card and confirm -->
      <div id="voting-view">
        <p class="section-label">Pick your card:</p>
        <div class="card-grid" id="card-grid"></div>
        <button class="confirm-btn" id="confirm-btn" disabled>✓ &nbsp;Confirm Vote</button>
      </div>

      <!-- View 2: vote submitted, waiting for others -->
      <div id="voted-view" hidden>
        <p class="section-label">Your vote:</p>
        <div class="voted-display">
          <div class="card card--voted" id="voted-card"></div>
        </div>
        <p class="vote-count" id="vote-count"></p>
        <div class="voted-actions">
          <button class="change-btn" id="change-btn">Change Vote</button>
          <!-- Host only -->
          <button class="reveal-btn" id="reveal-btn" hidden>Reveal Votes</button>
        </div>
      </div>

      <!-- View 3: votes revealed -->
      <div id="revealed-view" hidden>
        <p class="section-label">Results</p>
        <div class="results-grid" id="results-grid"></div>
        <div class="results-stats" id="results-stats"></div>
        <!-- Host only -->
        <button class="new-round-btn" id="new-round-btn" hidden>Start New Round</button>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
  <script src="../config.js"></script>
  <script src="app.js"></script>
</body>
</html>
