name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          CLOUD_PROJECT_NUMBER: ${{ secrets.CLOUD_PROJECT_NUMBER }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          RECAPTCHA_V3_SITE_KEY: ${{ secrets.RECAPTCHA_V3_SITE_KEY }}
        run: |
          echo "const CONFIG = { cloudProjectNumber: '${CLOUD_PROJECT_NUMBER}', recaptchaSiteKey: '${RECAPTCHA_V3_SITE_KEY}', firebase: ${FIREBASE_CONFIG} };" > config.js
          echo "config.js generated — $(wc -c < config.js) bytes"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
